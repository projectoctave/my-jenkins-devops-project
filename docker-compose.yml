services:
  movie_db:
    image: postgres:12.1-alpine
    volumes:
      - postgres_data_movie:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=movie_db_username
      - POSTGRES_PASSWORD=movie_db_password
      - POSTGRES_DB=movie_db_dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movie_db_username -d movie_db_dev']
      interval: 4s
      timeout: 5s
      retries: 15
      start_period: 15s

  cast_db:
    image: postgres:12.1-alpine
    volumes:
      - postgres_data_cast:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=cast_db_username
      - POSTGRES_PASSWORD=cast_db_password
      - POSTGRES_DB=cast_db_dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cast_db_username -d cast_db_dev']
      interval: 4s
      timeout: 5s
      retries: 15
      start_period: 15s

  movie_service:
    build: ./movie-service
    volumes:
      - ./movie-service/:/app/
    environment:
      - DATABASE_URI=postgresql://movie_db_username:movie_db_password@movie_db/movie_db_dev
      - CAST_SERVICE_HOST_URL=http://cast_service:8000/api/v1/casts/
    depends_on:
      movie_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/movies/')",
        ]
      interval: 6s
      timeout: 5s
      retries: 15
      start_period: 60s

  cast_service:
    build: ./cast-service
    volumes:
      - ./cast-service/:/app/
    environment:
      - DATABASE_URI=postgresql://cast_db_username:cast_db_password@cast_db/cast_db_dev
    depends_on:
      cast_db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/casts/docs')",
        ]
      interval: 6s
      timeout: 5s
      retries: 15
      start_period: 60s

  nginx:
    image: nginx:latest
    ports:
      # Local : 8080. Jenkins : PUBLIC_NGINX_PORT=9080 (voir Jenkinsfile).
      - "${PUBLIC_NGINX_PORT:-8080}:8080"
    volumes:
      - ./nginx_config.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      movie_service:
        condition: service_healthy
      cast_service:
        condition: service_healthy

volumes:
  postgres_data_movie:
  postgres_data_cast:
